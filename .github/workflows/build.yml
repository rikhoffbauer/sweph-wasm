name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.57

      - name: Compile
        run: |
          cd lib/src
          make clean
          make astro
          make install

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: sweph-dist
          path: dist
